<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jason Li Hong</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f4f0;
      color: #111;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
    }

    .emoji {
      font-size: 2.5rem;
      animation: bob 3s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 0.8rem;
      color: #999;
      font-style: italic;
    }

    #status {
      font-size: 0.75rem;
      color: #bbb;
      min-height: 1.2em;
    }

    #status::after {
      content: '|';
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <span class="emoji">🚧</span>
  <h1>Under Construction</h1>
  <p>jason is busy doing very important things — something's coming. eventually.</p>
  <span id="status"></span>

  <script>
    const messages = [
      "convincing myself I'll finish this tomorrow",
      "404: motivation not found",
      "estimated completion: yes",
      "professionally procrastinating",
      "running on caffeine and false hope",
    ];
    let i = 0;
    const el = document.getElementById('status');

    function type(msg) {
      el.textContent = '';
      let j = 0;
      const t = setInterval(() => {
        el.textContent += msg[j++];
        if (j >= msg.length) clearInterval(t);
      }, 45);
    }

    type(messages[0]);
    setInterval(() => { i = (i + 1) % messages.length; type(messages[i]); }, 3500);
  </script>
</body>
</html>
